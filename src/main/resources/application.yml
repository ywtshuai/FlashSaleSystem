server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: flash-sale-system
  datasource:
    master:
      driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
      url: ${MASTER_DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      username: ${MASTER_DB_USERNAME:root}
      password: ${MASTER_DB_PASSWORD:123456}
    slave:
      driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
      url: ${SLAVE_DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      username: ${SLAVE_DB_USERNAME:root}
      password: ${SLAVE_DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
  sql:
    init:
      mode: always
      encoding: UTF-8
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: flash-sale-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.flashsale.dto
        spring.json.value.default.type: com.flashsale.dto.SeckillOrderMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: input
  mapper-locations: classpath:/mapper/**/*.xml

jwt:
  secret: FlashSaleSystemJwtSecretKey2026FlashSaleSystem
  expiration: ${JWT_EXPIRATION:7200000}

flash-sale:
  kafka:
    seckill-topic: flash-sale-seckill-topic
