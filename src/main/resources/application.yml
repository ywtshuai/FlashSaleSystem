server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:user-product-service}
  datasource:
    master:
      driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
      url: ${MASTER_DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      username: ${MASTER_DB_USERNAME:root}
      password: ${MASTER_DB_PASSWORD:123456}
    slave:
      driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
      url: ${SLAVE_DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
      username: ${SLAVE_DB_USERNAME:root}
      password: ${SLAVE_DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms
  sql:
    init:
      mode: always
      encoding: UTF-8
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
    consumer:
      group-id: flash-sale-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.flashsale.dto
        spring.json.value.default.type: com.flashsale.dto.SeckillOrderMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: input
  mapper-locations: classpath:/mapper/**/*.xml

jwt:
  secret: FlashSaleSystemJwtSecretKey2026FlashSaleSystem
  expiration: ${JWT_EXPIRATION:7200000}

eureka:
  client:
    enabled: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    fetch-registry: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

flash-sale:
  microservice:
    enabled: ${FLASH_SALE_MICROSERVICE_ENABLED:false}
  discovery:
    enabled: ${FLASH_SALE_DISCOVERY_ENABLED:false}
  internal-auth:
    enabled: ${FLASH_SALE_INTERNAL_AUTH_ENABLED:true}
    token: ${INTERNAL_SERVICE_TOKEN:FlashSaleInternalToken2026}
    header-name: X-Internal-Token
    service-name-header: X-Service-Name
    allowed-services:
      - user-product-service
      - order-service
      - inventory-service
  kafka:
    seckill-topic: flash-sale-seckill-topic
    seckill-dlt-topic: flash-sale-seckill-topic-dlt
    retry-interval: 1000
    max-attempts: 3
  services:
    order-service-id: ${ORDER_SERVICE_ID:order-service}
    order-service-url: ${ORDER_SERVICE_URL:http://localhost:8081}
    inventory-service-id: ${INVENTORY_SERVICE_ID:inventory-service}
    inventory-service-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
