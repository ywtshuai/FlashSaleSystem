server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: ${APP_NAME:inventory-service}
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

eureka:
  client:
    enabled: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    fetch-registry: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

flash-sale:
  internal-auth:
    enabled: ${FLASH_SALE_INTERNAL_AUTH_ENABLED:true}
    token: ${INTERNAL_SERVICE_TOKEN:FlashSaleInternalToken2026}
    header-name: X-Internal-Token
    service-name-header: X-Service-Name
    allowed-services:
      - user-product-service
      - order-service
      - inventory-service
