server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: ${APP_NAME:order-service}
  datasource:
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    url: ${DB_URL:jdbc:mysql://localhost:3306/flash_sale_system?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: flash-sale-order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.flashsale.order.dto
        spring.json.value.default.type: com.flashsale.order.dto.SeckillOrderMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: input

eureka:
  client:
    enabled: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    register-with-eureka: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    fetch-registry: ${FLASH_SALE_DISCOVERY_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

flash-sale:
  discovery:
    enabled: ${FLASH_SALE_DISCOVERY_ENABLED:false}
  internal-auth:
    enabled: ${FLASH_SALE_INTERNAL_AUTH_ENABLED:true}
    token: ${INTERNAL_SERVICE_TOKEN:FlashSaleInternalToken2026}
    header-name: X-Internal-Token
    service-name-header: X-Service-Name
    allowed-services:
      - user-product-service
      - order-service
      - inventory-service
  kafka:
    seckill-topic: ${SECKILL_TOPIC:flash-sale-seckill-topic}
    seckill-dlt-topic: ${SECKILL_DLT_TOPIC:flash-sale-seckill-topic-dlt}
  services:
    inventory-service-id: ${INVENTORY_SERVICE_ID:inventory-service}
    inventory-service-url: ${INVENTORY_SERVICE_URL:http://localhost:8082}
